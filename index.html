<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>S.I.N.G.U.L.A.R.I.T.Y. X</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; cursor: none; }
        canvas { display: block; }
        #cursor {
            position: absolute; width: 35px; height: 35px; border: 1px solid var(--c);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.5s; z-index: 1000;
            box-shadow: 0 0 25px var(--c);
        }
        /* Улучшенный HUD для мобильных */
        .hud {
            position: absolute; color: var(--c); font-size: 8px; letter-spacing: 2px;
            pointer-events: none; opacity: 0.5; text-shadow: 0 0 5px var(--c);
            text-transform: uppercase; transition: color 0.5s; z-index: 10;
        }
        #ui-t { 
            top: 40px; /* Увеличен отступ сверху для камер-вырезов */
            width: 100%; text-align: center; font-size: 14px; letter-spacing: 8px; font-weight: 800;
        }
        #ui-bl { 
            bottom: 30px; left: 20px; border-left: 2px solid var(--c); padding-left: 10px; 
        }
        #ui-tr { 
            top: 70px; right: 20px; text-align: right; /* Сдвинуто ниже основного заголовка */
        }
        
        @media (max-width: 600px) {
            #ui-t { font-size: 11px; letter-spacing: 4px; top: 45px; }
            #ui-tr { top: 80px; font-size: 7px; }
            #ui-bl { font-size: 7px; bottom: 40px; }
        }

        .grid {
            position: absolute; width: 80px; height: 80px; border: 1px solid var(--c);
            opacity: 0.1; pointer-events: none; transition: all 0.5s; z-index: 1;
        }
        #g1 { top: 0; left: 0; border-right: none; border-bottom: none; }
        #g2 { bottom: 0; right: 0; border-left: none; border-top: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
</head>
<body style="--c: #00f2ff;">
    <div id="g1" class="grid"></div>
    <div id="g2" class="grid"></div>
    <div id="ui-t" class="hud">S.I.N.G.U.L.A.R.I.T.Y. X</div>
    <div id="ui-bl" class="hud">CORE: VORTEX v.5<br>STATUS: MAXIMUM<br>OS: HYPER_OPTIMIZED</div>
    <div id="ui-tr" class="hud">THREAT: ZERO<br>VECTOR: STABLE</div>
    <div id="cursor"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        
        let width, height, particles = [];
        let mouse = { x: -1000, y: -1000, active: false };
        let colors = ['#00f2ff', '#ff0055', '#00ff66', '#7000ff'];
        let colorIdx = 0;
        let pulse = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 170; i++) particles.push(new Particle(i));
        }

        class Particle {
            constructor(id) {
                this.id = id;
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.angle = Math.random() * Math.PI * 2;
                this.v = Math.random() * 0.04 + 0.01;
                this.dist = Math.random() * 110 + 40;
            }
            update(cX, cY) {
                if (this.x < -100 || this.x > width + 100) this.x = cX;
                if (this.y < -100 || this.y > height + 100) this.y = cY;

                this.angle += mouse.active ? (this.id % 2 === 0 ? 0.06 : -0.06) : this.v;
                let d = mouse.active ? (this.id % 2 === 0 ? 70 : 105) : this.dist;
                
                let targetX = cX + Math.cos(this.angle) * d;
                let targetY = cY + Math.sin(this.angle) * d;

                this.x += (targetX - this.x) * 0.2;
                this.y += (targetY - this.y) * 0.2;
            }
            draw() {
                ctx.fillStyle = colors[colorIdx];
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const move = (e) => {
            let nx = e.clientX || (e.touches && e.touches[0].clientX);
            let ny = e.clientY || (e.touches && e.touches[0].clientY);
            mouse.x = nx; mouse.y = ny;
            cursor.style.left = nx + 'px';
            cursor.style.top = ny + 'px';
        };

        const press = (e) => {
            mouse.active = true;
            colorIdx = (colorIdx + 1) % colors.length;
            document.body.style.setProperty('--c', colors[colorIdx]);
            cursor.style.width = '75px';
            cursor.style.height = '75px';
            if(e.type !== 'touchstart') move(e);
        };

        const release = () => {
            mouse.active = false;
            cursor.style.width = '35px';
            cursor.style.height = '35px';
        };

        window.addEventListener('mousemove', move);
        window.addEventListener('mousedown', press);
        window.addEventListener('mouseup', release);
        window.addEventListener('touchstart', (e) => { move(e); press(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', release);
        window.addEventListener('touchmove', (e) => { move(e); e.preventDefault(); }, {passive: false});

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; 
            ctx.fillRect(0, 0, width, height);
            pulse += 0.05;

            let cX = mouse.x < -500 ? width/2 + Math.cos(pulse*0.5)*50 : mouse.x;
            let cY = mouse.y < -500 ? height/2 + Math.sin(pulse*0.5)*50 : mouse.y;

            particles.forEach(p => { p.update(cX, cY); p.draw(); });

            ctx.lineWidth = 0.8;
            for(let i = 0; i < particles.length; i++) {
                for(let j = i + 1; j < particles.length; j++) {
                    let d2 = (particles[i].x-particles[j].x)**2 + (particles[i].y-particles[j].y)**2;
                    if(d2 < 6500) {
                        ctx.strokeStyle = colors[colorIdx] + '35';
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>

        display: flex;

</style>
